<script>
    // ============================================
    // CONFIGURATION – REPLACE WITH YOUR WEB APP URL
    // ============================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbyuvPZHMIR3KpXS7_nh36E95UznvRwEGN7JMmhaPl2LQk-K9peikbcLV2I07Nd74XbKag/exec';  // <-- PASTE YOUR NEW DEPLOYMENT URL HERE

    // Data structures
    let projects = [];
    let vendors = [];
    let payments = [];

    let currentProjectId = null;

    // --- Helper functions (same as before) ---
    function getNextId(collection) {
        return collection.length ? Math.max(...collection.map(i => i.id)) + 1 : 1;
    }
    function getVendorsByProject(projectId) {
        return vendors.filter(v => v.projectId === projectId);
    }
    function getPaymentsByVendor(vendorId) {
        return payments.filter(p => p.vendorId === vendorId);
    }
    function getEffectiveQuoted(vendor) {
        return vendor.revisedQuoted ? vendor.revisedQuoted : vendor.initialQuoted;
    }
    function getTotalPaid(vendorId) {
        return payments.filter(p => p.vendorId === vendorId).reduce((sum, p) => sum + p.amount, 0);
    }
    function getMilestones(vendor) {
        const effective = getEffectiveQuoted(vendor);
        return {
            first: effective * 0.3,
            second: effective * 0.4,
            third: effective * 0.3
        };
    }
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // --- Load all data from Google Sheets ---
    async function loadData() {
        try {
            const [projRes, vendRes, payRes] = await Promise.all([
                fetch(`${API_URL}?action=getProjects`),
                fetch(`${API_URL}?action=getVendors`),
                fetch(`${API_URL}?action=getPayments`)
            ]);
            const projData = await projRes.json();
            const vendData = await vendRes.json();
            const payData = await payRes.json();

            projects = projData.data || [];
            vendors = vendData.data || [];
            payments = payData.data || [];

            // Ensure numbers are parsed (they come as strings from sheet)
            projects = projects.map(p => ({ ...p, id: Number(p.id) }));
            vendors = vendors.map(v => ({
                ...v,
                id: Number(v.id),
                projectId: Number(v.projectId),
                estimateAmount: v.estimateAmount ? Number(v.estimateAmount) : null,
                initialQuoted: Number(v.initialQuoted),
                revisedQuoted: v.revisedQuoted ? Number(v.revisedQuoted) : null
            }));
            payments = payments.map(p => ({
                ...p,
                id: Number(p.id),
                vendorId: Number(p.vendorId),
                amount: Number(p.amount)
            }));
        } catch (err) {
            console.error('Failed to load from Google Sheets', err);
            alert('Error loading data. Check console and ensure the web app URL is correct.');
        }
        renderViewBasedOnState();
    }

    // --- Save all data to Google Sheets (replace everything) ---
    async function saveData() {
        try {
            // Send all three datasets in parallel
            await Promise.all([
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'saveProjects', rows: projects })
                }),
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'saveVendors', rows: vendors })
                }),
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'savePayments', rows: payments })
                })
            ]);
        } catch (err) {
            console.error('Failed to save to Google Sheets', err);
            alert('Error saving data. Check console.');
        }
    }

    // --- UI rendering (unchanged) ---
    function renderProjectList() {
        const container = document.getElementById('projects-container');
        if (!container) return;
        if (projects.length === 0) {
            container.innerHTML = '<p class="badge">No projects yet. Click "New Project" to start.</p>';
            return;
        }
        let html = '';
        projects.forEach(proj => {
            html += `
                <div class="project-card">
                    <div>
                        <h3>${escapeHtml(proj.name)}</h3>
                        <p style="color: #64748b;">${escapeHtml(proj.description || 'No description')}</p>
                    </div>
                    <div class="actions">
                        <button onclick="openProject(${proj.id})">Open</button>
                        <button class="danger" onclick="deleteProject(${proj.id})">Delete</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderProjectDashboard() {
        if (!currentProjectId) return;
        const project = projects.find(p => p.id === currentProjectId);
        if (!project) return;
        document.getElementById('dashboard-project-name').textContent = project.name;
        const vendorList = getVendorsByProject(currentProjectId);
        const container = document.getElementById('vendors-table-container');
        if (vendorList.length === 0) {
            container.innerHTML = '<p>No vendors added yet. Click "Add Vendor" to add one.</p>';
            return;
        }
        let tableHtml = `
            <table>
                <thead>
                    <tr>
                        <th>Ref</th><th>Name</th><th>Estimate</th><th>Initial</th><th>Revised</th>
                        <th>Effective</th><th>Milestones (30/40/30)</th><th>Paid</th><th>Balance</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>
        `;
        vendorList.forEach(vendor => {
            const effective = getEffectiveQuoted(vendor);
            const totalPaid = getTotalPaid(vendor.id);
            const milestones = getMilestones(vendor);
            const balance = effective - totalPaid;
            tableHtml += `
                <tr>
                    <td>${escapeHtml(vendor.vendorRef)}</td>
                    <td>${escapeHtml(vendor.vendorName)}</td>
                    <td>${vendor.estimateAmount ? '₹' + vendor.estimateAmount.toFixed(2) : '-'}</td>
                    <td>₹${vendor.initialQuoted.toFixed(2)}</td>
                    <td>${vendor.revisedQuoted ? '₹' + vendor.revisedQuoted.toFixed(2) : '-'}</td>
                    <td><strong>₹${effective.toFixed(2)}</strong></td>
                    <td>₹${milestones.first.toFixed(2)} / ₹${milestones.second.toFixed(2)} / ₹${milestones.third.toFixed(2)}</td>
                    <td>₹${totalPaid.toFixed(2)}</td>
                    <td>₹${balance.toFixed(2)}</td>
                    <td class="actions">
                        <button onclick="openPaymentModal(${vendor.id})">Add Payment</button>
                        <button class="secondary" onclick="editVendor(${vendor.id})">Edit</button>
                        <button class="danger" onclick="deleteVendor(${vendor.id})">Del</button>
                    </td>
                </tr>
            `;
        });
        tableHtml += '</tbody></table>';
        container.innerHTML = tableHtml;
    }

    function renderViewBasedOnState() {
        if (currentProjectId) {
            document.getElementById('project-list-view').style.display = 'none';
            document.getElementById('project-dashboard-view').style.display = 'block';
            renderProjectDashboard();
        } else {
            document.getElementById('project-list-view').style.display = 'block';
            document.getElementById('project-dashboard-view').style.display = 'none';
            renderProjectList();
        }
    }

    function showProjectList() {
        currentProjectId = null;
        renderViewBasedOnState();
    }

    function showProjectDashboard(projectId) {
        currentProjectId = projectId;
        renderViewBasedOnState();
    }

    // --- Modal controls ---
    function closeModal(type) {
        document.getElementById(`${type}-modal`).classList.remove('active');
    }
    function openModal(type) {
        document.getElementById(`${type}-modal`).classList.add('active');
    }

    // --- Event listeners ---
    document.getElementById('add-project-btn').addEventListener('click', () => {
        document.getElementById('project-modal-title').textContent = 'Add Project';
        document.getElementById('project-form').reset();
        openModal('project');
    });

    document.getElementById('project-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('project-name').value.trim();
        const description = document.getElementById('project-description').value.trim();
        if (!name) return;
        const newProject = {
            id: getNextId(projects),
            name,
            description
        };
        projects.push(newProject);
        await saveData();
        closeModal('project');
        renderViewBasedOnState();
    });

    window.deleteProject = async (id) => {
        if (!confirm('Delete this project and all its vendors and payments?')) return;
        const vendorIds = vendors.filter(v => v.projectId === id).map(v => v.id);
        vendors = vendors.filter(v => v.projectId !== id);
        payments = payments.filter(p => !vendorIds.includes(p.vendorId));
        projects = projects.filter(p => p.id !== id);
        await saveData();
        if (currentProjectId === id) showProjectList();
        else renderViewBasedOnState();
    };

    window.openProject = (id) => {
        showProjectDashboard(id);
    };

    document.getElementById('back-to-projects').addEventListener('click', showProjectList);

    document.getElementById('add-vendor-btn').addEventListener('click', () => {
        document.getElementById('vendor-modal-title').textContent = 'Add Vendor';
        document.getElementById('vendor-form').reset();
        document.getElementById('vendor-id').value = '';
        openModal('vendor');
    });

    document.getElementById('vendor-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const vendorId = document.getElementById('vendor-id').value;
        const vendorRef = document.getElementById('vendor-ref').value.trim();
        const vendorName = document.getElementById('vendor-name').value.trim();
        const estimateAmount = parseFloat(document.getElementById('estimate-amount').value) || null;
        const initialQuoted = parseFloat(document.getElementById('initial-quoted').value);
        const revisedQuoted = parseFloat(document.getElementById('revised-quoted').value) || null;
        if (!vendorRef || !vendorName || isNaN(initialQuoted) || initialQuoted <= 0) return;

        if (vendorId) {
            const index = vendors.findIndex(v => v.id === parseInt(vendorId));
            if (index !== -1) {
                vendors[index] = { ...vendors[index], vendorRef, vendorName, estimateAmount, initialQuoted, revisedQuoted };
            }
        } else {
            const newVendor = {
                id: getNextId(vendors),
                projectId: currentProjectId,
                vendorRef,
                vendorName,
                estimateAmount,
                initialQuoted,
                revisedQuoted
            };
            vendors.push(newVendor);
        }
        await saveData();
        closeModal('vendor');
        renderViewBasedOnState();
    });

    window.editVendor = (id) => {
        const vendor = vendors.find(v => v.id === id);
        if (!vendor) return;
        document.getElementById('vendor-modal-title').textContent = 'Edit Vendor';
        document.getElementById('vendor-id').value = vendor.id;
        document.getElementById('vendor-ref').value = vendor.vendorRef;
        document.getElementById('vendor-name').value = vendor.vendorName;
        document.getElementById('estimate-amount').value = vendor.estimateAmount || '';
        document.getElementById('initial-quoted').value = vendor.initialQuoted;
        document.getElementById('revised-quoted').value = vendor.revisedQuoted || '';
        openModal('vendor');
    };

    window.deleteVendor = async (id) => {
        if (!confirm('Delete this vendor and all its payments?')) return;
        vendors = vendors.filter(v => v.id !== id);
        payments = payments.filter(p => p.vendorId !== id);
        await saveData();
        renderViewBasedOnState();
    };

    window.openPaymentModal = (vendorId) => {
        document.getElementById('payment-vendor-id').value = vendorId;
        document.getElementById('payment-form').reset();
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('payment-date').value = today;
        openModal('payment');
    };

    document.getElementById('payment-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const vendorId = parseInt(document.getElementById('payment-vendor-id').value);
        const amount = parseFloat(document.getElementById('payment-amount').value);
        const paymentDate = document.getElementById('payment-date').value;
        const notes = document.getElementById('payment-notes').value.trim();
        if (isNaN(amount) || amount <= 0 || !paymentDate) return;
        const newPayment = {
            id: getNextId(payments),
            vendorId,
            amount,
            paymentDate,
            notes: notes || null
        };
        payments.push(newPayment);
        await saveData();
        closeModal('payment');
        renderViewBasedOnState();
    });

    // Initial load
    loadData();
</script>
